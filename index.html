<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Ingressos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f1f5f9;
      color: #1e293b;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .dashboard-title {
      font-size: 42px;
      font-weight: 800;
      color: #1e293b;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    /* Topbar */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text { font-size: 17px; font-weight: 700; color: #1e293b; }
    .logo-text span { color: #6366f1; }

    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #ecfdf5; border: 1px solid #6ee7b7;
      color: #059669; font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 100px;
    }

    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #10b981; animation: blink 1.5s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .main { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }

    /* Status */
    .status-msg {
      font-size: 13px; padding: 10px 16px; border-radius: 8px;
      margin-bottom: 20px; display: none; font-weight: 500;
    }
    .status-msg.error   { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; display: block; }
    .status-msg.loading { background: #f0f9ff; border: 1px solid #93c5fd; color: #2563eb; display: block; }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .card {
      border-radius: 16px; padding: 26px 24px;
      position: relative; overflow: hidden;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.45s ease, transform 0.45s ease, box-shadow 0.2s;
      cursor: default;
    }

    .card.visible { opacity: 1; transform: translateY(0); }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.12); transform: translateY(-2px) !important; }

    .card.total    { background: linear-gradient(135deg, #6366f1, #818cf8); }
    .card.retirado { background: linear-gradient(135deg, #10b981, #34d399); }
    .card.pendente { background: linear-gradient(135deg, #f59e0b, #fbbf24); }

    .card-label {
      font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(255,255,255,0.8); margin-bottom: 10px;
    }

    .card-value {
      font-size: 56px; font-weight: 900; line-height: 1;
      letter-spacing: -0.03em; color: #fff;
    }

    .card-icon-bg {
      position: absolute; right: -10px; top: -10px;
      font-size: 70px; opacity: 0.12;
      user-select: none; pointer-events: none;
    }

    /* Card de Meta */
    .meta-row {
      margin-bottom: 16px;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.45s ease 0.2s, transform 0.45s ease 0.2s;
    }
    .meta-row.visible { opacity: 1; transform: translateY(0); }

    .meta-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
      padding: 24px 28px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
    }

    .meta-left { display: flex; flex-direction: column; gap: 4px; min-width: 180px; }

    .meta-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #64748b;
    }

    .meta-numbers { display: flex; align-items: baseline; gap: 10px; }

    .meta-faltam {
      font-size: 52px; font-weight: 900; line-height: 1;
      letter-spacing: -0.03em; color: #6366f1;
    }

    .meta-faltam-label { font-size: 14px; font-weight: 600; color: #94a3b8; }

    .meta-right { flex: 1; min-width: 200px; }

    .meta-bar-header {
      display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;
    }

    .meta-bar-title { font-size: 14px; font-weight: 600; color: #475569; }

    .meta-pct {
      font-size: 28px; font-weight: 900;
      background: linear-gradient(135deg, #6366f1, #10b981);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .meta-bar-track { height: 12px; background: #f1f5f9; border-radius: 100px; overflow: hidden; }

    .meta-bar-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, #6366f1, #10b981);
      width: 0%; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .meta-bar-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; font-weight: 500; color: #94a3b8; margin-top: 6px;
    }

    /* Taxa de Retirada */
    .progress-section {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
      padding: 24px 28px; margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.45s ease 0.35s, transform 0.45s ease 0.35s;
    }
    .progress-section.visible { opacity: 1; transform: translateY(0); }

    .progress-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    }
    .progress-title { font-size: 15px; font-weight: 700; color: #1e293b; }
    .progress-pct {
      font-size: 30px; font-weight: 900;
      background: linear-gradient(135deg, #10b981, #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .progress-stats { display: flex; gap: 0; margin-bottom: 14px; }

    .pstat { flex: 1; text-align: center; padding: 12px 8px; border-radius: 12px; }
    .pstat.green  { background: #f0fdf4; }
    .pstat.orange { background: #fffbeb; }

    .pstat-num { font-size: 32px; font-weight: 900; line-height: 1; letter-spacing: -0.02em; }
    .pstat.green  .pstat-num { color: #10b981; }
    .pstat.orange .pstat-num { color: #f59e0b; }

    .pstat-label {
      font-size: 11px; font-weight: 600; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px;
    }

    .pstat-pct { font-size: 13px; font-weight: 700; margin-top: 2px; }
    .pstat.green  .pstat-pct { color: #059669; }
    .pstat.orange .pstat-pct { color: #d97706; }

    .pstat-divider { width: 1px; background: #e2e8f0; margin: 8px 0; }

    .bar-track { height: 12px; background: #f1f5f9; border-radius: 100px; overflow: hidden; }
    .bar-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, #10b981, #6366f1);
      width: 0%; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Footer */
    .footer { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .refresh-btn {
      background: transparent; border: 1.5px solid #e2e8f0; color: #64748b;
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
      padding: 5px 14px; border-radius: 6px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s; margin-left: 8px;
    }
    .refresh-btn:hover { border-color: #6366f1; color: #6366f1; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">🎟️</div>
      <div class="logo-text">Dashboard de <span>Ingressos</span></div>
    </div>
    <div class="live-badge"><div class="live-dot"></div> Ao vivo</div>
  </div>

  <div class="main">

    <div id="statusMsg" class="status-msg"></div>

    <h1 class="dashboard-title">Intensivo da Alta Performance</h1>

    <div class="cards">
      <div class="card total" id="cardTotal">
        <div class="card-icon-bg">🎟️</div>
        <div class="card-label">Total de Confirmados</div>
        <div class="card-value" id="valTotal">—</div>
      </div>
      <div class="card retirado" id="cardRetirado">
        <div class="card-icon-bg">✅</div>
        <div class="card-label">Ingressos Retirados</div>
        <div class="card-value" id="valRetirado">—</div>
      </div>
      <div class="card pendente" id="cardPendente">
        <div class="card-icon-bg">⏳</div>
        <div class="card-label">Aguardando Retirada</div>
        <div class="card-value" id="valPendente">—</div>
      </div>
    </div>

    <div class="meta-row" id="metaRow">
      <div class="meta-card">
        <div class="meta-left">
          <div class="meta-label">🎯 Meta — 500 Confirmados</div>
          <div class="meta-numbers">
            <div class="meta-faltam" id="valFaltam">—</div>
            <div class="meta-faltam-label">faltam</div>
          </div>
        </div>
        <div class="meta-right">
          <div class="meta-bar-header">
            <span class="meta-bar-title">Progresso da meta</span>
            <span class="meta-pct" id="metaPct">0%</span>
          </div>
          <div class="meta-bar-track">
            <div class="meta-bar-fill" id="metaBarFill"></div>
          </div>
          <div class="meta-bar-labels">
            <span id="valTotalLabel">0 confirmados</span>
            <span>meta: 500</span>
          </div>
        </div>
      </div>
    </div>

    <div class="progress-section" id="progressSection">
      <div class="progress-header">
        <span class="progress-title">Taxa de Retirada</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-stats">
        <div class="pstat green">
          <div class="pstat-num" id="statRetirado">—</div>
          <div class="pstat-label">Retirados</div>
          <div class="pstat-pct" id="statRetiradoPct">—%</div>
        </div>
        <div class="pstat-divider"></div>
        <div class="pstat orange">
          <div class="pstat-num" id="statPendente">—</div>
          <div class="pstat-label">Faltam retirar</div>
          <div class="pstat-pct" id="statPendentePct">—% do total</div>
        </div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>

    <div class="footer">
      <span id="lastUpdate"></span>
      <button class="refresh-btn" onclick="loadData()">↻ Atualizar</button>
    </div>

  </div>

<script>
  const META = 500;

  const CONFIG = {
    sheetId: '1tQ49EtHlq3MkQY7JfyCf9uvr9xKx77RtS0N2LpO6vt0',
    tab:     'IAP MAIO 26',
    apiKey:  'AIzaSyB7Y3yf7qh5qIVX76sdjq5QBqoBfnO__34'
  };

  let _total = 0, _retirados = 0, _pendentes = 0;

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + (type || '');
  }

  function animateValue(el, target) {
    const start = parseInt(el.textContent) || 0;
    const diff = target - start;
    const steps = 40;
    let i = 0;
    const timer = setInterval(() => {
      i++;
      el.textContent = Math.round(start + diff * (i / steps));
      if (i >= steps) { el.textContent = target; clearInterval(timer); }
    }, 20);
  }

  async function loadData() {
    const { sheetId, tab, apiKey } = CONFIG;
    // L = confirmado (1/0), M = ingresso retirado (1/0)
    const range = encodeURIComponent(`${tab}!L2:M2000`);
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${apiKey}`;

    try {
      const res  = await fetch(url);
      const json = await res.json();

      if (json.error) {
        showStatus('❌ Erro da API: ' + json.error.message + ' (código ' + json.error.code + ')', 'error');
        return;
      }

      const rows = json.values || [];
      _total     = rows.filter(r => r[0] === '1' || r[0] === 1).length;
      _retirados = rows.filter(r => r[1] === '1' || r[1] === 1).length;
      _pendentes = _total - _retirados;

      const pctRetirada = _total > 0 ? Math.round((_retirados / _total) * 100) : 0;
      const pctPendente = _total > 0 ? Math.round((_pendentes / _total) * 100) : 0;
      const faltam      = Math.max(META - _total, 0);
      const pctMeta     = Math.min(Math.round((_total / META) * 100), 100);

      animateValue(document.getElementById('valTotal'),    _total);
      animateValue(document.getElementById('valRetirado'), _retirados);
      animateValue(document.getElementById('valPendente'), _pendentes);
      animateValue(document.getElementById('valFaltam'),   faltam);

      document.getElementById('metaPct').textContent       = pctMeta + '%';
      document.getElementById('valTotalLabel').textContent = _total + ' confirmados';
      document.getElementById('progressPct').textContent   = pctRetirada + '%';
      document.getElementById('statRetirado').textContent    = _retirados;
      document.getElementById('statRetiradoPct').textContent = pctRetirada + '% do total';
      document.getElementById('statPendente').textContent    = _pendentes;
      document.getElementById('statPendentePct').textContent = pctPendente + '% do total';

      setTimeout(() => {
        document.getElementById('metaBarFill').style.width = pctMeta + '%';
        document.getElementById('barFill').style.width     = pctRetirada + '%';
      }, 100);

      document.querySelectorAll('.card, .meta-row, .progress-section').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 70);
      });

      document.getElementById('lastUpdate').textContent =
        'Atualizado às ' + new Date().toLocaleTimeString('pt-BR') + ' · próxima atualização em 10 min';

      showStatus('', '');

    } catch (e) {
      showStatus('❌ Falha na requisição: ' + e.message, 'error');
    }
  }

  loadData();
  setInterval(() => loadData(), 600000);
</script>
</body>
</html>
