<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Ingressos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f1f5f9;
      color: #1e293b;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── MODO NORMAL ── */
    .page-normal { display: block; }
    .page-tv { display: none; }

    /* Topbar */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      color: #1e293b;
    }

    .logo-text span { color: #6366f1; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ecfdf5;
      border: 1px solid #6ee7b7;
      color: #059669;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 100px;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #10b981;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .btn-tv {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-tv:hover { opacity: 0.85; }

    /* Main content */
    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Config panel */
    .config-panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 160px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #64748b;
    }

    input, select {
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      color: #1e293b;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 9px 13px;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      background: #fff;
    }

    input::placeholder { color: #94a3b8; }

    .btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status */
    .status-msg {
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
    }
    .status-msg.error { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; display: block; }
    .status-msg.loading { background: #f0f9ff; border: 1px solid #93c5fd; color: #2563eb; display: block; }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      border-radius: 16px;
      padding: 26px 24px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.45s ease, transform 0.45s ease, box-shadow 0.2s;
      cursor: default;
    }

    .card.visible { opacity: 1; transform: translateY(0); }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.12); transform: translateY(-2px); }
    .card.visible:hover { transform: translateY(-2px); }

    .card.total    { background: linear-gradient(135deg, #6366f1, #818cf8); }
    .card.retirado { background: linear-gradient(135deg, #10b981, #34d399); }
    .card.pendente { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .card.naoretirou { background: linear-gradient(135deg, #ef4444, #f87171); }

    .card-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 56px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #fff;
    }

    .card-icon-bg {
      position: absolute;
      right: -10px;
      top: -10px;
      font-size: 70px;
      opacity: 0.12;
      user-select: none;
      pointer-events: none;
    }

    /* Progress */
    .progress-section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.45s ease 0.3s, transform 0.45s ease 0.3s;
    }
    .progress-section.visible { opacity: 1; transform: translateY(0); }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .progress-title {
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
    }

    .progress-pct {
      font-size: 30px;
      font-weight: 900;
      background: linear-gradient(135deg, #10b981, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bar-track {
      height: 12px;
      background: #f1f5f9;
      border-radius: 100px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #10b981, #6366f1);
      width: 0%;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-legend {
      display: flex;
      gap: 18px;
      margin-top: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
    }

    .legend-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .refresh-btn {
      background: transparent;
      border: 1.5px solid #e2e8f0;
      color: #64748b;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      margin-left: 8px;
    }
    .refresh-btn:hover { border-color: #6366f1; color: #6366f1; }

    /* ═══════════════════════════════════════
       MODO TV
    ═══════════════════════════════════════ */
    .page-tv {
      background: #0f172a;
      min-height: 100vh;
      padding: 0;
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    .tv-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .tv-title {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .tv-title span { color: #818cf8; }

    .tv-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .tv-live {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.4);
      color: #34d399;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 100px;
    }

    .tv-time {
      font-size: 15px;
      font-weight: 600;
      color: #94a3b8;
    }

    .btn-exit-tv {
      background: rgba(255,255,255,0.08);
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-exit-tv:hover { background: rgba(255,255,255,0.14); }

    .tv-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      padding: 28px 48px;
      height: calc(100vh - 90px);
    }

    .tv-card {
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .tv-card.visible { opacity: 1; transform: scale(1); }

    .tv-card.total    { background: linear-gradient(145deg, #4f46e5, #7c3aed); }
    .tv-card.retirado { background: linear-gradient(145deg, #059669, #10b981); }
    .tv-card.pendente { background: linear-gradient(145deg, #d97706, #f59e0b); }
    .tv-card.naoretirou { background: linear-gradient(145deg, #dc2626, #ef4444); }

    .tv-card-icon {
      font-size: 52px;
      opacity: 0.25;
      position: absolute;
      top: 20px;
      right: 28px;
    }

    .tv-card-label {
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      text-align: center;
    }

    .tv-card-value {
      font-size: clamp(80px, 14vw, 160px);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .tv-card-bg-num {
      position: absolute;
      bottom: -30px;
      left: -10px;
      font-size: 220px;
      font-weight: 900;
      color: rgba(0,0,0,0.1);
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    /* Progresso TV */
    .tv-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: rgba(255,255,255,0.15);
    }

    .tv-progress-fill {
      height: 100%;
      background: rgba(255,255,255,0.6);
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }
  </style>
</head>
<body>

<!-- ══════════ PÁGINA NORMAL ══════════ -->
<div class="page-normal" id="pageNormal">

  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">🎟️</div>
      <div class="logo-text">Dashboard de <span>Ingressos</span></div>
    </div>
    <div class="topbar-right">
      <div class="live-badge"><div class="live-dot"></div> Ao vivo</div>
      <button class="btn-tv" onclick="openTV()">📺 Modo TV</button>
    </div>
  </div>

  <div class="main">

    <div class="config-panel">
      <div class="field">
        <label>ID da Planilha (Google Sheets)</label>
        <input id="sheetId" type="text" placeholder="1BxiMVs0XRA5nFMdK..." value="1tQ49EtHlq3MkQY7JfyCf9uvr9xKx77RtS0N2LpO6vt0"/>
      </div>
      <div class="field" style="max-width:160px">
        <label>Aba</label>
        <input id="sheetTab" type="text" placeholder="Página1" value="IAP MAIO 26"/>
      </div>
      <div class="field" style="max-width:130px">
        <label>Coluna Status</label>
        <input id="colStatus" type="text" placeholder="G" value="G" maxlength="3"/>
      </div>
      <div class="field" style="max-width:200px">
        <label>API Key Google</label>
        <input id="apiKey" type="password" placeholder="AIza..."/>
      </div>
      <button class="btn" onclick="loadData()">Carregar</button>
    </div>

    <div id="statusMsg" class="status-msg"></div>

    <div class="cards">
      <div class="card total" id="cardTotal">
        <div class="card-icon-bg">🎟️</div>
        <div class="card-label">Total de Inscritos</div>
        <div class="card-value" id="valTotal">—</div>
      </div>
      <div class="card retirado" id="cardRetirado">
        <div class="card-icon-bg">✅</div>
        <div class="card-label">Ingressos Retirados</div>
        <div class="card-value" id="valRetirado">—</div>
      </div>
      <div class="card pendente" id="cardPendente">
        <div class="card-icon-bg">⏳</div>
        <div class="card-label">Aguardando Retirada</div>
        <div class="card-value" id="valPendente">—</div>
      </div>
      <div class="card naoretirou" id="cardNaoRetirou">
        <div class="card-icon-bg">❌</div>
        <div class="card-label">Não Retirou</div>
        <div class="card-value" id="valNaoRetirou">—</div>
      </div>
    </div>

    <div class="progress-section" id="progressSection">
      <div class="progress-header">
        <span class="progress-title">Taxa de Retirada</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
      <div class="progress-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> Retirou</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Aguardando</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Não Retirou</div>
      </div>
    </div>

    <div class="footer">
      <span id="lastUpdate"></span>
      <button class="refresh-btn" onclick="loadData()">↻ Atualizar</button>
    </div>

  </div>
</div>

<!-- ══════════ MODO TV ══════════ -->
<div class="page-tv" id="pageTV">

  <div class="tv-topbar">
    <div class="tv-title">Dashboard de <span>Ingressos</span></div>
    <div class="tv-meta">
      <div class="tv-live"><div class="live-dot"></div> Ao vivo</div>
      <div class="tv-time" id="tvClock"></div>
    </div>
    <button class="btn-exit-tv" onclick="closeTV()">✕ Sair do Modo TV</button>
  </div>

  <div class="tv-cards">

    <div class="tv-card total" id="tvCardTotal">
      <div class="tv-card-icon">🎟️</div>
      <div class="tv-card-bg-num" id="tvBgTotal"></div>
      <div class="tv-card-label">Total de Inscritos</div>
      <div class="tv-card-value" id="tvValTotal">—</div>
      <div class="tv-progress"><div class="tv-progress-fill" style="width:100%"></div></div>
    </div>

    <div class="tv-card retirado" id="tvCardRetirado">
      <div class="tv-card-icon">✅</div>
      <div class="tv-card-bg-num" id="tvBgRetirado"></div>
      <div class="tv-card-label">Ingressos Retirados</div>
      <div class="tv-card-value" id="tvValRetirado">—</div>
      <div class="tv-progress"><div class="tv-progress-fill" id="tvBarRetirado"></div></div>
    </div>

    <div class="tv-card pendente" id="tvCardPendente">
      <div class="tv-card-icon">⏳</div>
      <div class="tv-card-bg-num" id="tvBgPendente"></div>
      <div class="tv-card-label">Aguardando Retirada</div>
      <div class="tv-card-value" id="tvValPendente">—</div>
      <div class="tv-progress"><div class="tv-progress-fill" id="tvBarPendente"></div></div>
    </div>

    <div class="tv-card naoretirou" id="tvCardNaoRetirou">
      <div class="tv-card-icon">❌</div>
      <div class="tv-card-bg-num" id="tvBgNaoRetirou"></div>
      <div class="tv-card-label">Não Retirou</div>
      <div class="tv-card-value" id="tvValNaoRetirou">—</div>
      <div class="tv-progress"><div class="tv-progress-fill" id="tvBarNaoRetirou"></div></div>
    </div>

  </div>
</div>

<script>
  // ── Persistência de config ──
  const fields = ['sheetId','sheetTab','colStatus','apiKey'];
  fields.forEach(id => {
    const el = document.getElementById(id);
    const saved = localStorage.getItem('dash_' + id);
    if (saved) el.value = saved;
    el.addEventListener('input', () => localStorage.setItem('dash_' + id, el.value));
  });

  // ── Dados globais ──
  let _total = 0, _retirados = 0, _pendentes = 0, _naoRetirou = 0;
  let autoRefreshTimer = null;

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + (type || '');
  }

  function animateValue(el, target) {
    const start = parseInt(el.textContent) || 0;
    const diff = target - start;
    const steps = 40;
    let i = 0;
    const timer = setInterval(() => {
      i++;
      el.textContent = Math.round(start + diff * (i / steps));
      if (i >= steps) { el.textContent = target; clearInterval(timer); }
    }, 20);
  }

  async function loadData() {
    const sheetId = document.getElementById('sheetId').value.trim();
    const tab     = document.getElementById('sheetTab').value.trim() || 'Página1';
    const col     = document.getElementById('colStatus').value.trim().toUpperCase() || 'G';
    const apiKey  = document.getElementById('apiKey').value.trim();

    if (!sheetId || !apiKey) {
      showStatus('⚠️ Preencha o ID da planilha e a API Key.', 'error');
      return;
    }

    showStatus('Carregando dados...', 'loading');

    const range = encodeURIComponent(`${tab}!${col}2:${col}10000`);
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${apiKey}`;

    try {
      const res  = await fetch(url);
      const json = await res.json();

      if (json.error) {
        showStatus('❌ Erro da API: ' + json.error.message + ' (código ' + json.error.code + ')', 'error');
        return;
      }

      const rows      = json.values || [];
      const validas   = rows.filter(r => r[0] && r[0].trim() !== '');
      _retirados  = validas.filter(r => r[0].trim().toUpperCase() === 'RETIROU').length;
      _pendentes  = validas.filter(r => r[0].trim().toUpperCase() === 'AGUARDANDO RETIRAR').length;
      _naoRetirou = validas.filter(r => r[0].trim().toUpperCase() === 'NÃO RETIROU').length;
      _total      = _retirados + _pendentes + _naoRetirou;
      const pct   = _total > 0 ? Math.round((_retirados / _total) * 100) : 0;

      // Atualiza cards normais
      animateValue(document.getElementById('valTotal'),     _total);
      animateValue(document.getElementById('valRetirado'),  _retirados);
      animateValue(document.getElementById('valPendente'),  _pendentes);
      animateValue(document.getElementById('valNaoRetirou'),_naoRetirou);

      // Progress
      document.getElementById('progressPct').textContent = pct + '%';
      setTimeout(() => {
        document.getElementById('barFill').style.width = pct + '%';
      }, 100);

      // Anima entrada dos cards
      document.querySelectorAll('.card, .progress-section').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 70);
      });

      // Atualiza modo TV (se aberto)
      updateTV();

      document.getElementById('lastUpdate').textContent =
        'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');

      showStatus('', '');

    } catch (e) {
      showStatus('❌ Falha na requisição: ' + e.message, 'error');
    }
  }

  function updateTV() {
    document.getElementById('tvValTotal').textContent      = _total     > 0 ? _total     : '—';
    document.getElementById('tvValRetirado').textContent   = _retirados > 0 ? _retirados : '—';
    document.getElementById('tvValPendente').textContent   = _pendentes > 0 ? _pendentes : '—';
    document.getElementById('tvValNaoRetirou').textContent = _naoRetirou> 0 ? _naoRetirou: '—';

    document.getElementById('tvBgTotal').textContent      = _total     || '';
    document.getElementById('tvBgRetirado').textContent   = _retirados || '';
    document.getElementById('tvBgPendente').textContent   = _pendentes || '';
    document.getElementById('tvBgNaoRetirou').textContent = _naoRetirou|| '';

    if (_total > 0) {
      setTimeout(() => {
        document.getElementById('tvBarRetirado').style.width   = Math.round(_retirados  / _total * 100) + '%';
        document.getElementById('tvBarPendente').style.width   = Math.round(_pendentes  / _total * 100) + '%';
        document.getElementById('tvBarNaoRetirou').style.width = Math.round(_naoRetirou / _total * 100) + '%';
      }, 200);
    }

    document.querySelectorAll('.tv-card').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 80);
    });
  }

  function openTV() {
    document.getElementById('pageTV').style.display = 'block';
    document.getElementById('pageNormal').style.display = 'none';
    updateTV();
    startClock();
    // auto-refresh a cada 60s no modo TV
    autoRefreshTimer = setInterval(() => loadData(), 60000);
  }

  function closeTV() {
    document.getElementById('pageTV').style.display = 'none';
    document.getElementById('pageNormal').style.display = 'block';
    if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  }

  function startClock() {
    function tick() {
      document.getElementById('tvClock').textContent =
        new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    tick();
    setInterval(tick, 1000);
  }

  // Auto-carregar se já tiver config salva
  if (localStorage.getItem('dash_sheetId') && localStorage.getItem('dash_apiKey')) {
    loadData();
  }
</script>
</body>
</html>
