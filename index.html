<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Ingressos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --success: #10b981;
      --pending: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 { background: rgba(124,58,237,0.12); top: -200px; left: -200px; }
    .glow-2 { background: rgba(6,182,212,0.08); bottom: -200px; right: -200px; }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    header {
      margin-bottom: 48px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      color: #a78bfa;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 16px;
    }

    .badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #a78bfa;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #fff;
    }

    h1 span {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Config panel */
    .config-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 200px;
    }

    label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 24px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Error / status */
    .status-msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 24px;
      display: none;
    }
    .status-msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; display: block; }
    .status-msg.loading { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3); color: #a78bfa; display: block; }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .card.visible { opacity: 1; transform: translateY(0); }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover::before { opacity: 1; }

    .card.total::before { background: radial-gradient(circle at 0% 0%, rgba(124,58,237,0.08), transparent 60%); }
    .card.retirado::before { background: radial-gradient(circle at 0% 0%, rgba(16,185,129,0.08), transparent 60%); }
    .card.pendente::before { background: radial-gradient(circle at 0% 0%, rgba(245,158,11,0.08), transparent 60%); }
    .card.naoretirou::before { background: radial-gradient(circle at 0% 0%, rgba(239,68,68,0.08), transparent 60%); }

    .card-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .card.total .card-icon { background: rgba(124,58,237,0.15); }
    .card.retirado .card-icon { background: rgba(16,185,129,0.15); }
    .card.pendente .card-icon { background: rgba(245,158,11,0.15); }
    .card.naoretirou .card-icon { background: rgba(239,68,68,0.15); }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .card-value {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .card.total .card-value { color: #c4b5fd; }
    .card.retirado .card-value { color: #6ee7b7; }
    .card.pendente .card-value { color: #fcd34d; }
    .card.naoretirou .card-value { color: #fca5a5; }

    /* Progress bar */
    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
    }

    .progress-section.visible { opacity: 1; transform: translateY(0); }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }

    .progress-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .progress-pct {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bar-track {
      height: 10px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #7c3aed, #10b981);
      width: 0%;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    /* Last updated */
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      margin-left: 10px;
    }

    .refresh-btn:hover { border-color: var(--accent); color: #a78bfa; }
  </style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="container">
  <header>
    <div class="badge"><span class="dot"></span> Ao vivo</div>
    <h1>Dashboard de <span>Ingressos</span></h1>
    <p class="subtitle">Controle em tempo real — retirados vs. pendentes</p>
  </header>

  <div class="config-panel">
    <div class="field">
      <label>ID da Planilha (Google Sheets)</label>
      <input id="sheetId" type="text" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" value="1tQ49EtHlq3MkQY7JfyCf9uvr9xKx77RtS0N2LpO6vt0" />
    </div>
    <div class="field" style="max-width:180px">
      <label>Aba</label>
      <input id="sheetTab" type="text" placeholder="Página1" value="IAP MAIO 26" />
    </div>
    <div class="field" style="max-width:180px">
      <label>Coluna de Status (letra)</label>
      <input id="colStatus" type="text" placeholder="G" value="G" maxlength="3" />
    </div>
    <div class="field" style="max-width:200px">
      <label>API Key do Google</label>
      <input id="apiKey" type="password" placeholder="AIza..." />
    </div>
    <button class="btn" onclick="loadData()">Carregar</button>
  </div>

  <div id="statusMsg" class="status-msg"></div>

  <div class="cards">
    <div class="card total" id="cardTotal">
      <div class="card-icon">🎟️</div>
      <div class="card-label">Total de Inscritos</div>
      <div class="card-value" id="valTotal">—</div>
    </div>
    <div class="card retirado" id="cardRetirado">
      <div class="card-icon">✅</div>
      <div class="card-label">Ingressos Retirados</div>
      <div class="card-value" id="valRetirado">—</div>
    </div>
    <div class="card pendente" id="cardPendente">
      <div class="card-icon">⏳</div>
      <div class="card-label">Aguardando Retirada</div>
      <div class="card-value" id="valPendente">—</div>
    </div>
    <div class="card naoretirou" id="cardNaoRetirou">
      <div class="card-icon">❌</div>
      <div class="card-label">Não Retirou</div>
      <div class="card-value" id="valNaoRetirou">—</div>
    </div>
  </div>

  <div class="progress-section" id="progressSection">
    <div class="progress-header">
      <span class="progress-title">Taxa de Retirada</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
    <div class="progress-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> Retirou</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Aguardando</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Não Retirou</div>
    </div>
  </div>

  <div class="footer">
    <span id="lastUpdate"></span>
    <button class="refresh-btn" onclick="loadData()">↻ Atualizar</button>
  </div>
</div>

<script>
  // Salvar config no localStorage
  const fields = ['sheetId','sheetTab','colStatus','apiKey'];
  fields.forEach(id => {
    const el = document.getElementById(id);
    const saved = localStorage.getItem('dash_' + id);
    if (saved) el.value = saved;
    el.addEventListener('input', () => localStorage.setItem('dash_' + id, el.value));
  });

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + (type || '');
  }

  function animateValue(el, target) {
    let current = 0;
    const step = Math.ceil(target / 40);
    const interval = setInterval(() => {
      current = Math.min(current + step, target);
      el.textContent = current;
      if (current >= target) clearInterval(interval);
    }, 30);
  }

  async function loadData() {
    const sheetId = document.getElementById('sheetId').value.trim();
    const tab     = document.getElementById('sheetTab').value.trim() || 'Página1';
    const col     = document.getElementById('colStatus').value.trim().toUpperCase() || 'G';
    const apiKey  = document.getElementById('apiKey').value.trim();

    if (!sheetId || !apiKey) {
      showStatus('⚠️ Preencha o ID da planilha e a API Key.', 'error');
      return;
    }

    showStatus('Carregando dados...', 'loading');

    // Range: pega a coluna de status inteira (linha 2 em diante pra pular cabeçalho)
    const range = encodeURIComponent(`${tab}!${col}2:${col}10000`);
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${apiKey}`;

    try {
      const res = await fetch(url);
      const json = await res.json();

      if (json.error) {
        showStatus('❌ Erro da API: ' + json.error.message + ' (código ' + json.error.code + ')', 'error');
        console.error('Google API error:', json.error);
        return;
      }

      const rows = json.values || [];
      const validas   = rows.filter(r => r[0] && r[0].trim() !== '');
      const retirados = validas.filter(r => r[0].trim().toUpperCase() === 'RETIROU').length;
      const pendentes = validas.filter(r => r[0].trim().toUpperCase() === 'AGUARDANDO RETIRAR').length;
      const naoRetirou = validas.filter(r => r[0].trim().toUpperCase() === 'NÃO RETIROU').length;
      const total     = retirados + pendentes + naoRetirou;
      const pct       = total > 0 ? Math.round((retirados / total) * 100) : 0;

      // Atualiza cards
      animateValue(document.getElementById('valTotal'), total);
      animateValue(document.getElementById('valRetirado'), retirados);
      animateValue(document.getElementById('valPendente'), pendentes);
      animateValue(document.getElementById('valNaoRetirou'), naoRetirou);

      // Progress
      document.getElementById('progressPct').textContent = pct + '%';
      setTimeout(() => {
        document.getElementById('barFill').style.width = pct + '%';
      }, 100);

      // Animações de entrada
      document.querySelectorAll('.card, .progress-section').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 80);
      });

      // Timestamp
      document.getElementById('lastUpdate').textContent =
        'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');

      showStatus('', '');

    } catch (e) {
      showStatus('❌ Falha na requisição: ' + e.message, 'error');
      console.error(e);
    }
  }

  // Auto-carregar se já tiver config salva
  if (localStorage.getItem('dash_sheetId') && localStorage.getItem('dash_apiKey')) {
    loadData();
  }
</script>
</body>
</html>
